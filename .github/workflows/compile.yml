name: Compile
run-name: Compiling - ${{ github.event.head_commit.message }}
on: [push]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  Compile:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Compile
      uses: xu-cheng/latex-action@v2
      with:
        root_file: main.tex
        latexmk_use_xelatex: true
        args: -pdfxe -interaction=nonstopmode
        extra_fonts: |
          fonts/*

    - name: Release
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        files: |
          main.pdf

    - name: Prepare GitHub Pages
      run: |
        mkdir -p _site
        cp main.pdf _site/main.pdf
        cat > _site/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Curriculum Vitae</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body { height: 100%; }
            body { display: flex; flex-direction: column; font-family: sans-serif; background: #525659; }
            header { padding: 8px 16px; background: #1a1d1f; color: #fff; text-align: center; font-size: 1.1em; }
            iframe { flex: 1; border: none; width: 100%; }
          </style>
        </head>
        <body>
          <header>Curriculum Vitae – Dominik Maszczyk</header>
          <iframe src="main.pdf" title="Curriculum Vitae">
            <p>Your browser does not support embedded PDFs.
            <a href="main.pdf">Download the CV (PDF)</a>.</p>
          </iframe>
        </body>
        </html>
        EOF

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

  Deploy:
    needs: Compile
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deploy
      uses: actions/deploy-pages@v4
